name: Continuous Integration (CI) Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          MLFLOW_TRACKING_URI: https://dagshub.com/oscar-sinaga/Predictive-Maintenance-MLOps.mlflow
        run: |
          cd MLProject
          mlflow run . --env-manager local

      - name: Get latest MLflow run_id
        id: get_run_id
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          MLFLOW_TRACKING_URI: https://dagshub.com/oscar-sinaga/Predictive-Maintenance-MLOps.mlflow
        run: |
          RUN_ID=$(python -c "import mlflow; client = mlflow.tracking.MlflowClient(); experiment = client.get_experiment_by_name('Advance_Predictive_Maintenance'); runs = client.search_runs(experiment.experiment_id, order_by=['start_time DESC'], max_results=1); print(runs[0].info.run_id) if runs else print('')")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Berhasil mendapatkan Run ID: $RUN_ID"

      - name: Install Python dependencies
        run: pip install --upgrade setuptools wheel

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-artifacts-${{ env.RUN_ID }}
          path: MLProject/artifacts/
          retention-days: 7

      - name: Build Docker Model (with mlflow models build-docker)
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          MLFLOW_TRACKING_URI: https://dagshub.com/oscar-sinaga/Predictive-Maintenance-MLOps.mlflow
        run: |
          cd MLProject
          # Tambahkan --env-manager conda untuk menghindari bug Python 3.9
          mlflow models build-docker \
            -m "runs:/${{ env.RUN_ID }}/random_forest_model" \
            -n "oscarmsinaga/predictive-maintenance-model" \
            --env-manager conda
            
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag & Push Docker Image
        run: |
          # Kita beri tag SHA agar tetap ada history versinya
          docker tag oscarmsinaga/predictive-maintenance-model:latest oscarmsinaga/predictive-maintenance-model:${{ github.sha }}
          
          # Push keduanya ke Docker Hub
          docker push oscarmsinaga/predictive-maintenance-model:latest
          docker push oscarmsinaga/predictive-maintenance-model:${{ github.sha }}